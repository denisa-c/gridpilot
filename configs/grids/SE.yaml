notes: >
  Stress case for the low-CI tail.  Almost every hour is cleaner than the
  EU mean, so absolute savings from temporal shifting are small and the
  marginal lift from f-SLA elicitation is the largest *fraction* of the
  total reduction (the few high-CI hours dominate).  Diurnal CI amplitude
  is tight (~±10 %) and weekend factor is ~0.95.
