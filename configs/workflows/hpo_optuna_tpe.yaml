# =====================================================================
# configs/workflows/hpo_optuna_tpe.yaml
# ---------------------------------------------------------------------
# Synthetic hyperparameter-sweep DAG: an Optuna-TPE-style search over
# a 100-trial budget with early stopping at hour 1.  The DAG is
# generated by scripts/workflows/synth_hpo_dag.py; the parameters
# below pin the random-seed behaviour so replays are reproducible.
# =====================================================================

name: "hpo_optuna_tpe"
description: >
  100-trial TPE sweep with early-stopping branching at hour 1.  Each
  trial is one job in the DAG; if the validation-loss falls below the
  early-stop threshold, the conditional edge to the "next-rung" trial
  is NOT taken (early-stop branch), and the user effectively releases
  the GPU back to the cluster.  This is the canonical example used to
  test H3 (conditional DAGs unlock latent flexibility).

n_trials: 100
trial_runtime_h: 4.0            # nominal trial runtime if not stopped
early_stop_runtime_h: 1.0       # cutoff at which the conditional edge fires
early_stop_probability: 0.50    # declared early-stop rate (TPE-typical)
num_nodes_per_trial: 1
declared_tier: 2                # T2 (Day) for each individual trial

# Branching distribution declared by the user (audited by M-Workflow).
# Sum to 1.0 by convention.
declared_branching:
  early_stopped: 0.50           # parent decides "early-stopped"
  default:       0.50           # parent decides "continue"
