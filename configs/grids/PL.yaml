notes: >
  Stress case for the high-CI tail.  Most hours are dirty so absolute
  CO2 savings from temporal shifting are largest, but f-SLA elicitation
  hits diminishing returns: the marginal lift from extending the
  deferral window is small because every window is dirty.  Diurnal
  amplitude ~±28 % driven by daily wind variation.  Weekend factor
  ~0.88 (heavy industrial demand drop).
